<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PREVIEW WHATSAPP -->

<meta property="og:title" content="Haruo & Cintia ❤️">

<meta property="og:description"
      content="Com alegria convidamos você para celebrar o nosso casamento ✨">

<meta property="og:image"
      content="https://djharuo.github.io/haruoecintia/foto-noivos.jpg">

<meta property="og:url"
      content="https://djharuo.github.io/haruoecintia/">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<title>Haruo & Cintia</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Cormorant Garamond', serif;
    background:#f5ede3;
    color:#5f4633;
}

.page{
    position:absolute;
    inset:0;
    width:100%;
    height:100vh;
    overflow-y:auto;
    display:none;
    padding:20px;
    justify-content:center;
    align-items:center;
}

.page.active{
    display:flex;
    animation:fade 0.8s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ENVELOPE */

.envelope-wrapper{
    text-align:center;
}

.envelope-container{
    position:relative;
    width:320px;
    height:220px;
    margin:auto;
    cursor:pointer;
}

.envelope{
    position:absolute;
    width:100%;
    height:100%;
    background:#d8b89c;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.envelope:before{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:#c79e79;
    clip-path:polygon(0 0,50% 55%,100% 0);
    z-index:3;
}

.envelope:after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:#b8875f;
    clip-path:polygon(0 100%,50% 45%,100% 100%);
    z-index:3;
}

.letter{
    position:absolute;
    width:88%;
    height:88%;
    left:6%;
    top:6%;
    background:#fffdf8;
    border-radius:8px;
    z-index:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:0.6s;
    padding:20px;
}

.envelope-container:hover .letter{
    transform:translateY(-65px);
}

.letter h1{
    font-family:'Great Vibes', cursive;
    font-size:50px;
    color:#9b6b43;
    font-weight:normal;
}

.letter p{
    font-size:20px;
    margin-top:8px;
}

/* HERO */

.hero{
    background:
    linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
    url('foto-noivos.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.hero-card{
    background:rgba(255,255,255,0.13);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:30px;
    padding:35px 24px;
    max-width:680px;
    width:100%;
    text-align:center;
    color:white;
}

.couple-photo{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid rgba(255,255,255,0.85);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    margin-bottom:20px;
}

.hero-card h1{
    font-family:'Great Vibes', cursive;
    font-size:78px;
    font-weight:normal;
}

.hero-card p{
    font-size:24px;
    margin-top:12px;
}

.date{
    margin-top:20px;
    font-size:30px;
}

/* PÁGINA 3 */

.special-bg{
    background:
    linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)),
    url('haruo.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.special-content{
    background:rgba(255,255,255,0.13);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:30px;
    padding:40px 28px;
    color:white;
}

.special-content h2{
    color:white;
}

.special-content .verse{
    color:#5f4633;
}

/* CONTENT */

.content{
    max-width:820px;
    width:100%;
    text-align:center;
}

.content h2{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    color:#9b6b43;
    margin-bottom:18px;
    font-weight:normal;
}

.content p{
    font-size:24px;
    line-height:1.7;
}

.verse{
    margin-top:28px;
    background:white;
    padding:24px;
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    font-size:22px;
    line-height:1.6;
}

/* BUTTONS */

.nav-btn{
    margin-top:30px;
    display:inline-block;
    background:#9b6b43;
    color:white;
    text-decoration:none;
    padding:14px 26px;
    border-radius:40px;
    font-size:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    border:none;
    cursor:pointer;
}

/* CARDS */

.links-grid,
.gifts{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-top:35px;
}

.contact-card,
.card,
.pix-box{
    background:white;
    padding:24px 20px;
    border-radius:24px;
    text-decoration:none;
    color:#5f4633;
    box-shadow:0 12px 35px rgba(0,0,0,0.08);
}

.emoji,
.icon{
    font-size:42px;
}

.contact-card h3,
.card h3{
    margin-top:14px;
    font-size:28px;
}

.contact-card p,
.card p{
    margin-top:10px;
    font-size:20px;
    line-height:1.5;
}

/* PIX */

.pix-box{
    margin-top:35px;
}

.pix-box h3{
    font-size:34px;
}

.pix-input{
    width:100%;
    margin-top:16px;
    padding:14px;
    border-radius:14px;
    border:2px solid #d4c1ae;
    font-size:20px;
    text-align:center;
}

.pix-key{
    margin-top:18px;
    background:#f8f2eb;
    padding:16px;
    border-radius:14px;
    font-size:15px;
    word-break:break-all;
}

.copy-btn{
    margin-top:18px;
    border:none;
    background:#9b6b43;
    color:white;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
}

.copy-msg{
    margin-top:12px;
    color:green;
    display:none;
    font-size:18px;
}

/* FINAL */

.final{
    background:
    linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
    url('cintia.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
}

.final-card{
    text-align:center;
    max-width:800px;
    background:rgba(255,255,255,0.13);
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:30px;
    padding:40px 28px;
}

.final-card h2{
    font-family:'Great Vibes', cursive;
    font-size:72px;
    font-weight:normal;
}

.final-card p{
    margin-top:16px;
    font-size:24px;
    line-height:1.7;
}

/* RESPONSIVO */

@media(max-width:768px){

.page{
    padding:14px;
}

.hero-card h1{
    font-size:58px;
}

.hero-card p,
.content p,
.final-card p{
    font-size:20px;
}

.content h2{
    font-size:48px;
}

.couple-photo{
    width:120px;
    height:120px;
}

.letter h1{
    font-size:42px;
}

.letter p{
    font-size:18px;
}

.final-card h2{
    font-size:56px;
}

}

</style>
</head>

<body>

<!-- PÁGINA 1 -->

<section class="page active" id="page1">

    <div class="envelope-wrapper">

        <div class="envelope-container" onclick="showPage(2)">

            <div class="envelope"></div>

            <div class="letter">
                <h1>Haruo & Cintia</h1>
                <p>Você recebeu um convite especial ❤️</p>
            </div>

        </div>

    </div>

</section>

<!-- PÁGINA 2 -->

<section class="page hero" id="page2">

    <div class="hero-card">

        <img src="foto-noivos.jpg" class="couple-photo">

        <h1>Haruo & Cintia</h1>

        <p>
            Com alegria convidamos você para celebrar o nosso casamento
        </p>

        <div class="date">
            13/06/2026 às 10:45h
        </div>

        <p style="margin-top:16px;font-size:22px;">
            🍽️ Almoço oferecido pelos noivos às 12:00h
        </p>

        <p style="margin-top:18px;">
            Churrascaria Boi Dourado — Curitiba/PR
        </p>

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:30px;">

            <a class="nav-btn" href="#" onclick="showPage(1)">
                ← Voltar
            </a>

            <a class="nav-btn" href="#" onclick="showPage(3)">
                Próxima Página ✨
            </a>

        </div>

    </div>

</section>

<script>

function showPage(pageNumber){

    const pages = document.querySelectorAll('.page');

    pages.forEach(page => {
        page.classList.remove('active');
    });

    document.getElementById('page' + pageNumber).classList.add('active');

}

</script>

</body>
</html>
